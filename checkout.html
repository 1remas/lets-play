<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="letsplay.css">
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_REAL_API_KEY&callback=initMap" async defer></script>
    <style>
     body {
    font-family: Arial, sans-serif;
    background-color: #FFEBB7; /* لون خلفية الصفحة */
    margin: 0;
    padding: 0;
}

.container {
    width: 80%;
    margin: 20px auto; /* جعل المحتوى في اليسار مع هامش بسيط */
    text-align: left;
}

.inputbox {
    background-color: #F4A32E; /* لون البرتقالي حول النموذج */
    padding: 20px;
    border-radius: 15px;
    
    box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.1);
}

.inputbox label {
    font-weight: bold;
    color: black;
}

.input {
    width: 100%; /* جعل الإدخالات أصغر */
    height: 35px;
    border: 1px solid #ccc;
    border-radius: 5px;
    padding: 5px;
    margin-bottom: 10px;
}

#btn {
    width: 100%;
    height: 40px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    color: white;
    background-color: #007BFF;
    transition: 0.3s;
}

#btn:hover {
    background-color: #0056b3;
}

    </style>
</head>
<body>
    <header>
        <img src="logo.jpg" alt="logo" height="150" width="150">
        <h1>LET'S PLAY</h1>
        <nav class="navigation">
            <b>
                <a href="home.html">Home</a>
            </b>
        </nav>
    </header>
    
    <div class="content-space">
        <h2>Choose Payment Method:</h2>
        <div class="form-group">
            <label for="payment-method">Payment Method:</label>
            <select id="payment-method" class="input">
                <option value="credit-card">Credit Card (Visa / MasterCard)</option>
                <option value="mada">Mada</option>
                <option value="apple-pay">Apple Pay</option>
                <option value="cash-on-delivery">Cash on Delivery</option>
            </select>
        </div>

        <h2>Choose Shipping Company:</h2>
        <div class="form-group">
            <label for="shipping-company">Shipping Company:</label>
            <select id="shipping-company" class="input">
                <option value="aramex">Aramex</option>
                <option value="smsa">SMSA</option>
                <option value="dhl">DHL</option>
            </select>
        </div>

        <h2>Personal Information</h2>
        <form class="inputbox">
            <label>Name:</label>
            <input type="text" class="input" required>

            <label>Phone Number:</label>
            <input type="tel" class="input" required>

            <label>Email:</label>
            <input type="email" class="input" required>

            <label>Location:</label>
            <input type="text" id="location-input" placeholder="Click the button to get your location" readonly required>
            <button type="button" onclick="getLocation()">📍 Get Location</button>

            <div id="map"></div>

            <button type="submit" id="btn">Checkout</button>
        </form>

        <script>
            function initMap() {
                let map = new google.maps.Map(document.getElementById("map"), {
                    center: { lat: 24.7136, lng: 46.6753 }, // Default center (Riyadh)
                    zoom: 10
                });
            }

            function getLocation() {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        function(position) { 
                            let lat = position.coords.latitude;
                            let lng = position.coords.longitude;

                            document.getElementById("location-input").value = lat + ", " + lng;

                            let map = new google.maps.Map(document.getElementById("map"), {
                                center: { lat: lat, lng: lng },
                                zoom: 15
                            });

                            new google.maps.Marker({
                                position: { lat: lat, lng: lng },
                                map: map
                            });
                        },
                        function(error) {
                            switch(error.code) {
                                case error.PERMISSION_DENIED:
                                    alert("❌ Location permission denied. Please allow access from browser settings.");
                                    break;
                                case error.POSITION_UNAVAILABLE:
                                    alert("❌ Location information is unavailable.");
                                    break;
                                case error.TIMEOUT:
                                    alert("⏳ Location request timed out. Try again.");
                                    break;
                                case error.UNKNOWN_ERROR:
                                    alert("⚠️ An unknown error occurred while getting the location.");
                                    break;
                            }
                        }
                    );
                } else {
                    alert("❌ Geolocation is not supported by this browser.");
                }
            }

            document.querySelector("form").addEventListener("submit", function(event) {
                event.preventDefault();  
                alert("✅ Your order has been received successfully!");
                window.location.href = 'home.html';
            });
        </script>
    </div>
    <footer>
        <small><i>Copyright © 2025 LET'S PLAY</i></small><br>
        <a href="mailto:yourname@example.com">letsplay@example.com</a>
    </footer>
</body>
</html>
